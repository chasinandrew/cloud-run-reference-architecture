apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${BACKEND_SERVICE}
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '100'
    spec:
      containerConcurrency: 80
      containers:
      - image: ${BACKEND_IMAGE}
        ports: 
        - name: http1
          containerPort: 8080
        env:
        - name: PROJECT_ID
          value: "todo"
        - name: "EDITOR_UPSTREAM_RENDERER_URL"
          value: "todo output" #TODO secrets 
  traffic:
  - percent: 100
    latestRevision: true
